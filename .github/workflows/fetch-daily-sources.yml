name: Fetch Daily Sources

on:
  schedule:
    # 每天 UTC 14:00（台灣時間 22:00）執行
    - cron: '0 14 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Reddit r/todayilearned
        continue-on-error: true
        run: bash scripts/fetch-reddit-til.sh

      - name: Delay (avoid Reddit rate limit)
        run: sleep 5

      - name: Reddit r/explainlikeimfive
        continue-on-error: true
        run: bash scripts/fetch-reddit-eli5.sh

      - name: Hacker News
        continue-on-error: true
        run: bash scripts/fetch-hn.sh

      - name: GitHub Trending
        continue-on-error: true
        run: bash scripts/fetch-github-trending.sh

      - name: Product Hunt
        continue-on-error: true
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: bash scripts/fetch-producthunt.sh

      - name: Wikipedia Featured
        continue-on-error: true
        run: bash scripts/fetch-wikipedia.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/
          if git diff --cached --quiet; then
            echo "無新檔案，跳過 commit"
          else
            git commit -m "feat: daily sources $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
